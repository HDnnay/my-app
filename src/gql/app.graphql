type Query {
  """获取文章详情"""
  article(
    """文章ID"""
    id: UUID!
  ): AppArticleDto

  """获取文章列表"""
  articles(
    """Returns the elements in the list that come after the specified cursor."""
    after: String

    """
    Returns the elements in the list that come before the specified cursor.
    """
    before: String

    """Returns the first _n_ elements from the list."""
    first: Int

    """Returns the last _n_ elements from the list."""
    last: Int
    order: [ArticleSortInput!]
    where: ArticleFilterInput
  ): ArticlesConnection

  """获取菜单详情"""
  menu(
    """菜单ID"""
    id: UUID!
  ): AppMenuDto

  """获取菜单树形结构"""
  menuTree: [AppMenuDto]

  """获取权限列表"""
  permissions: [AppPermissionDto]

  """获取角色详情"""
  role(
    """角色ID"""
    id: UUID!
  ): AppRoleDto

  """获取角色列表"""
  roles: [AppRoleDto]

  """获取用户详情"""
  user(
    """用户ID"""
    id: UUID!
  ): AppUserDto

  """获取用户列表"""
  users: [AppUserDto]
}

type Role {
  code: String!
  createdAt: DateTime!
  description: String
  id: UUID!
  isDisabled: Boolean!
  isSuperAdmin: Boolean!
  name: String!
  permissions: [Permission!]!
  updatedAt: DateTime
  users: [User!]!
