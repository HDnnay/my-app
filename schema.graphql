"""
The purpose of the `cost` directive is to define a `weight` for GraphQL types, fields, and arguments. Static analysis can use these weights when calculating the overall cost of a query or response.
"""
directive @cost(
  """
  The `weight` argument defines what value to add to the overall cost for every appearance, or possible appearance, of a type, field, argument, etc.
  """
  weight: String!
) on ARGUMENT_DEFINITION | ENUM | FIELD_DEFINITION | INPUT_FIELD_DEFINITION | OBJECT | SCALAR

input CreateMenuCommandInput {
  icon: String
  name: String!
  order: Int
  parentId: ID
  path: String
}

input CreateRoleCommandInput {
  code: String!
  description: String
  name: String!
  permissionIds: [ID]
}

input CreateUserCommandInput {
  email: String!
  name: String!
  userType: String!
}

"""The `DateTime` scalar represents an ISO-8601 compliant date time type."""
scalar DateTime

type MenuDto {
  childMenus: [MenuDto]
  createdAt: DateTime
  icon: String
  id: ID
  name: String
  order: Int
  parentId: ID
  path: String
  permissions: [PermissionDto]
  updatedAt: DateTime
}

type Mutation {
  """为菜单分配权限"""
  assignPermissionsToMenu(id: ID!, permissionIds: [ID!]!): SuccessResponse

  """为角色分配权限"""
  assignPermissionsToRole(id: ID!, permissionIds: [ID!]!): SuccessResponse

  """为用户分配角色"""
  assignRolesToUser(id: ID!, roleIds: [ID!]!): SuccessResponse

  """创建菜单"""
  createMenu(command: CreateMenuCommandInput!): MenuDto

  """创建角色"""
  createRole(command: CreateRoleCommandInput!): RoleDto

  """创建用户"""
  createUser(command: CreateUserCommandInput!): ID!

  """删除菜单"""
  deleteMenu(id: ID!): SuccessResponse

  """删除角色"""
  deleteRole(id: ID!): SuccessResponse

  """删除用户"""
  deleteUser(id: ID!): SuccessResponse

  """更新菜单"""
  updateMenu(command: UpdateMenuCommandInput!, id: ID!): MenuDto

  """更新角色"""
  updateRole(command: UpdateRoleCommandInput!, id: ID!): RoleDto

  """更新用户"""
  updateUser(command: UpdateUserCommandInput!, id: ID!): UserDto
}

type PermissionDto {
  childPermissions: [PermissionDto]
  code: String!
  createdAt: DateTime!
  description: String
  id: ID!
  name: String!
  parentId: ID
  roles: [RoleDto!]
  updatedAt: DateTime
}

type Query {
  """获取菜单详情"""
  menu(
    """菜单ID"""
    id: UUID!
  ): MenuDto

  """获取菜单树形结构"""
  menuTree: [MenuDto]

  """获取权限列表"""
  permissions: [PermissionDto]

  """获取角色详情"""
  role(
    """角色ID"""
    id: UUID!
  ): RoleDto

  """获取角色列表"""
  roles: [RoleDto]

  """获取用户详情"""
  user(
    """用户ID"""
    id: UUID!
  ): UserDto

  """获取用户列表"""
  users: [UserDto]
}

type RoleDto {
  code: String!
  createdAt: DateTime!
  description: String
  id: ID!
  isDisabled: Boolean!
  name: String!
  permissions: [PermissionDto]
  updatedAt: DateTime
}

type SuccessResponse {
  success: Boolean!
}

scalar UUID

input UpdateMenuCommandInput {
  icon: String
  id: UUID!
  name: String!
  order: Int
  parentId: ID
  path: String
}

input UpdateRoleCommandInput {
  code: String!
  description: String
  name: String!
  permissionIds: [ID]
  roleId: UUID!
}

input UpdateUserCommandInput {
  email: String!
  id: UUID!
  name: String!
  userType: String!
}

type UserDto {
  email: String!
  id: ID!
  isDisabled: Boolean!
  name: String!
  roles: [RoleDto]
  userType: String!
}